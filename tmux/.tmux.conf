set-option -g focus-events on

# Sätt standard-term
set -g default-terminal "tmux-256color"

# Aktivera RGB (True Color) stöd
# Detta är den kritiska raden för att slippa färgskiftningar
set -as terminal-features ",xterm-256color:RGB"

# Gör så att escape-sequences (som färgbyten) går snabbare
set -sg escape-time 10

# ==========================================
# Dayfox Terminal Fixes (För Ghostty & Neovim)
# ==========================================
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -ga terminal-overrides ",xterm-256color:Tc"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # Support för undercurls
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# ==========================================
# Dayfox Theme för Statusbar & Panes
# ==========================================

# Bell - helt tyst
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Clock mode (Dayfox Purple)
setw -g clock-mode-colour "#7d35a0"

# Copy mode (Matchar Dayfox selection)
setw -g mode-style 'fg=#3d2b5a bg=#e2e2e2 bold'

# Panes (Subtila kanter som i IntelliJ)
set -g pane-border-style 'fg=#cdcecf'
set -g pane-active-border-style 'fg=#2847a9' # Dayfox Blue

# Statusbar layout
set -g status-position bottom
set -g status-justify left
set -g status-style 'fg=#3d2b5a bg=#e9e9e9' # Dayfox bg2 (lite mörkare än huvud-bg)

set -g status-left ' #[fg=#2847a9,bold]󰒲 #S ' # Visar sessionnamn i blått
set -g status-left-length 100

# Status right: Datum och tid med Dayfox Blue/Purple accent
set -g status-right-style 'fg=#3d2b5a'
set -g status-right '#[fg=#7d35a0,bg=#e2e2e2] %d.%m.%Y #[fg=#ffffff,bg=#7d35a0,bold] %H:%M '
set -g status-right-length 100

# Window status - Normal (Inaktiv)
setw -g window-status-style 'fg=#8c8c8c bg=#e9e9e9'
setw -g window-status-format ' #I #[fg=#3d2b5a]#W #F '

# Window status - Current (Aktiv - Matchar Dayfox Blue accent)
setw -g window-status-current-style 'fg=#ffffff bg=#2847a9 bold'
setw -g window-status-current-format ' #I #W #F '

# Bell style
setw -g window-status-bell-style 'fg=#ffffff bg=#a52222 bold'

# Messages (Command line)
set -g message-style 'fg=#ffffff bg=#2847a9 bold'
